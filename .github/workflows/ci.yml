name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Action pinning policy: all third-party actions in this workflow use commit SHAs,
# not floating tags. See the test job's first checkout step for the full rationale.
# Same policy applies to .github/workflows/deploy.yml — keep them in sync.

jobs:
  test:
    name: typecheck + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: claude_for_you
          POSTGRES_USER: claude
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claude -d claude_for_you"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://claude:devpassword@localhost:5432/claude_for_you

    steps:
      # Third-party actions pinned to full commit SHAs (not floating tags) so a
      # compromised release tag can't silently swap in malicious code. Tag
      # comment is informational — verify against the upstream release before
      # bumping. persist-credentials: false drops the GITHUB_TOKEN from the
      # local .git/config after checkout (we never push from this workflow).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Bun version is mirrored in deploy.yml. TLS fingerprint and bun:test
          # runner behavior are version-sensitive in this repo — bump both files
          # together.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

  terraform-validate:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      # Pinned per the workflow-level action pinning policy at the top of this file.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.15.3
      - name: terraform fmt
        working-directory: terraform
        run: terraform fmt -check -diff
      - name: terraform init
        working-directory: terraform
        run: terraform init -backend=false
      - name: terraform validate
        working-directory: terraform
        run: terraform validate
