name: Deploy

# Triggered by `git push origin main:deploy` (see scripts/deploy.sh for the
# out-of-band SSM step that actually rolls the EC2 instance). This workflow
# does NOT deploy anything — it re-verifies that the commit on the deploy
# branch survives typecheck + test, so matrix-deploy's `gh run list --branch
# deploy` resolves to a real PASS/FAIL signal instead of an empty result.

on:
  push:
    branches: [deploy]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: re-verify deploy commit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: claude_for_you
          POSTGRES_USER: claude
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claude -d claude_for_you"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://claude:devpassword@localhost:5432/claude_for_you

    steps:
      # Third-party actions pinned to full commit SHAs (not floating tags) so a
      # compromised release tag can't silently swap in malicious code. Tag
      # comment is informational — verify against the upstream release before
      # bumping. persist-credentials: false drops the GITHUB_TOKEN from the
      # local .git/config after checkout (we never push from this workflow).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pin to the same Bun as ci.yml — TLS fingerprint and bun:test runner
          # behavior are version-sensitive in this repo. Bump both files together.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Report
        run: |
          echo "Deploy commit: $GITHUB_SHA"
          echo "Out-of-band: run \`bash scripts/deploy.sh\` locally to roll EC2 via SSM."
